<!DOCTYPE html>
<html lang="en">
<head>
    <title>PVF Stadium 3D Generator</title>
    <meta charset="utf-8">
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; overflow: hidden; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div id="info">
        <h2>PVF Stadium - Hung Yen</h2>
        <p>• 60,000 Seats | FIFA Pitch<br>• Retractable PTFE Roof<br>• Game-Ready PBR Geometry</p>
    </div>
    <div id="controls"><button id="export">Export PVF_Stadium.glb</button></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

        let scene, camera, renderer, exporter;
        
        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(150, 100, 150);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const controls = new OrbitControls(camera, renderer.domElement);
            exporter = new GLTFExporter();

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(100, 200, 100);
            sun.castShadow = true;
            scene.add(sun);

            // MATERIALS (PBR)
            const matPitch = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.8 });
            const matConcrete = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.5 });
            const matRoof = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.9, side: THREE.DoubleSide });
            const matSeats = new THREE.MeshStandardMaterial({ color: 0x333333 });

            // 1. PITCH (105x68m)
            const pitch = new THREE.Mesh(new THREE.PlaneGeometry(105, 68), matPitch);
            pitch.name = "pitch";
            pitch.rotation.x = -Math.PI / 2;
            scene.add(pitch);

            // 2. STANDS (Simplified tiered geometry for optimization)
            function createStand(name, x, z, rot) {
                const group = new THREE.Group();
                group.name = name;
                
                // Lower Tier
                const geo1 = new THREE.BoxGeometry(80, 15, 30);
                const mesh1 = new THREE.Mesh(geo1, matSeats);
                mesh1.position.set(0, 5, 45);
                group.add(mesh1);

                // Upper Tier
                const geo2 = new THREE.BoxGeometry(100, 25, 40);
                const mesh2 = new THREE.Mesh(geo2, matSeats);
                mesh2.position.set(0, 25, 75);
                group.add(mesh2);

                group.position.set(x, 0, z);
                group.rotation.y = rot;
                scene.add(group);
            }

            createStand("stand_north", 0, -10, 0);
            createStand("stand_south", 0, 10, Math.PI);
            createStand("stand_east", 10, 0, -Math.PI/2);
            createStand("stand_west", -10, 0, Math.PI/2);

            // 3. VIP ZONE
            const vip = new THREE.Mesh(new THREE.BoxGeometry(120, 5, 10), new THREE.MeshStandardMaterial({color: 0x111111, metalness: 0.9}));
            vip.name = "vip_zone";
            vip.position.set(0, 15, 55);
            scene.add(vip);

            // 4. ROOF (Retractable Logic)
            const roofFrameGeo = new THREE.TorusGeometry(100, 5, 16, 100);
            const roof = new THREE.Mesh(roofFrameGeo, matRoof);
            roof.name = "roof";
            roof.rotation.x = Math.PI / 2;
            roof.position.set(0, 50, 0);
            scene.add(roof);

            const panelGeo = new THREE.SphereGeometry(100, 32, 32, 0, Math.PI*2, 0, 0.3);
            const roofOpen = new THREE.Mesh(panelGeo, matRoof);
            roofOpen.name = "roof_open";
            roofOpen.position.y = 52;
            scene.add(roofOpen);

            // 5. PLAZA & PARKING
            const plaza = new THREE.Mesh(new THREE.CircleGeometry(250, 64), matConcrete);
            plaza.name = "plaza";
            plaza.rotation.x = -Math.PI / 2;
            plaza.position.y = -0.1;
            scene.add(plaza);

            const parking = new THREE.Mesh(new THREE.PlaneGeometry(200, 100), new THREE.MeshStandardMaterial({color: 0x222222}));
            parking.name = "parking";
            parking.rotation.x = -Math.PI / 2;
            parking.position.set(0, -0.05, 200);
            scene.add(parking);

            // EXPORT LOGIC
            document.getElementById('export').addEventListener('click', () => {
                exporter.parse(scene, (glb) => {
                    const blob = new Blob([glb], { type: 'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'PVF_Stadium_HungYen.glb';
                    link.click();
                }, { binary: true });
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
